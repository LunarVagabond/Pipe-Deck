name: Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag#v}" =~ ^([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "Could not derive semantic version from tag: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      - name: Verify version files match tag
        run: bash scripts/verify-release-version.sh "${{ steps.version.outputs.tag }}"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux bundles
        run: make build

      - name: Stage release assets and latest.json
        run: |
          chmod +x scripts/stage-release.sh
          bash scripts/stage-release.sh \
            "${{ steps.version.outputs.tag }}" \
            "${{ steps.version.outputs.version }}"

      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Pipe Deck ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: release-files/*

  flatpak-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # Best-effort: a Flatpak build issue (Flathub availability, sandbox
    # flakiness) should never block the native-bundle release above.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: pipe-deck-${{ steps.version.outputs.tag }}.flatpak
          manifest-path: flatpak/com.pipedeck.PipeDeck.yml

      - name: Upload Flatpak bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: "*.flatpak"

      - name: Attach Flatpak bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: false
          files: "*.flatpak"
