[package]
name = "pipe-deck"
version = "0.1.0"
description = "Linux Audio Control Center"
authors = ["Pipe Deck Contributors"]
edition = "2021"

[lib]
name = "pipe_deck_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tokio = { version = "1", features = ["sync", "time"] }
chrono = { version = "0.4", features = ["serde"] }
flate2 = "1"
tar = "0.4"
regex = "1"
